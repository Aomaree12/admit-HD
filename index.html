<!doctype html>
<html lang="th" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>รายงานเคสผู้ป่วยโรคไต Admit</title>
  
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            mint1: '#F3F9F7', mint2: '#D4F1EB', mint3: '#A6DFD0', mint4: '#7CCFC3', mint5: '#52B8A3',
            purple1: '#FAF5FF', purple2: '#F3E8FF', purple3: '#E9D5FF', purple4: '#D8B4FE', purple5: '#C084FC',
            surface: '#FFFFFF', txt: '#2D1B4E', txtlight: '#6B5B7F',
          }
        }
      }
    }
  </script>
  
  <style>
    html, body { height: 100%; margin: 0; font-family: 'Sarabun', sans-serif; background-color: #F3F9F7; }
    * { box-sizing: border-box; }
    .card-shadow { box-shadow: 0 2px 16px rgba(167,139,250,0.08), 0 1px 4px rgba(0,0,0,0.04); }
    .card-shadow-lg { box-shadow: 0 8px 32px rgba(167,139,250,0.12), 0 2px 8px rgba(0,0,0,0.06); }
    input, select, textarea { transition: border-color 0.2s, box-shadow 0.2s; }
    input:focus, select:focus, textarea:focus { border-color: #a78bfa !important; box-shadow: 0 0 0 3px rgba(167,139,250,0.15) !important; outline: none; }
    .btn-primary { background: linear-gradient(135deg, #c084fc 0%, #a855f7 100%); transition: all 0.2s; }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(168,85,247,0.35); }
    .msg-card { background: linear-gradient(135deg, #faf5ff 0%, #ffffff 100%); border-left: 4px solid #c084fc; }
    .fade-in { animation: fadeIn 0.35s ease-out; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    .overlay { background: rgba(88,28,135,0.3); backdrop-filter: blur(4px); }
    .toast-in { animation: toastIn 0.4s ease-out; }
    @keyframes toastIn { from { opacity:0; transform:scale(0.9) translateY(20px); } to { opacity:1; transform:scale(1) translateY(0); } }
    .success-toast { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
    .error-toast { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); }
    .warn-toast { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #ddd6fe; border-radius: 3px; }
  </style>
</head>
<body class="h-full">
  <div id="app" class="h-full w-full overflow-auto pb-10">
    <header class="bg-white card-shadow sticky top-0 z-30">
      <div class="max-w-5xl mx-auto px-4 py-4 flex items-center gap-3">
        <div class="w-11 h-11 rounded-2xl bg-gradient-to-br from-mint4 to-mint5 flex items-center justify-center flex-shrink-0">
          <i data-lucide="heart-pulse" class="text-white" style="width:22px;height:22px"></i>
        </div>
        <div>
          <h1 class="text-lg font-bold text-txt leading-tight">รายงานเคสผู้ป่วยโรคไต Admit</h1>
          <p class="text-xs text-txtlight leading-tight">Nephrology Admission Case Report</p>
        </div>
        <div class="ml-auto flex items-center gap-2">
          <button onclick="showHistory()" class="flex items-center gap-1.5 text-sm text-mint5 hover:text-mint4 bg-mint1 hover:bg-mint2 px-3 py-2 rounded-xl transition-colors font-medium"> 
            <i data-lucide="clock" style="width:16px;height:16px"></i> 
            <span class="hidden sm:inline">ประวัติ</span> 
          </button>
        </div>
      </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-6">
      <form id="admitForm" class="bg-white rounded-3xl card-shadow-lg p-5 sm:p-8 fade-in">
        <div class="flex items-center gap-2 mb-6 pb-4 border-b border-mint1">
          <i data-lucide="clipboard-plus" class="text-mint4" style="width:20px;height:20px"></i>
          <h2 class="text-base font-bold text-txt">บันทึกข้อมูลผู้ป่วย Admit</h2>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-x-5 gap-y-4">
          <div><label class="block text-sm font-medium text-txt mb-1.5">วันที่ Admit</label><input type="date" id="f-date" class="w-full border border-gray-200 rounded-xl px-3.5 py-2.5 text-sm text-txt bg-white" required></div>
          <div><label class="block text-sm font-medium text-txt mb-1.5">ชื่อ - นามสกุล</label><input type="text" id="f-name" placeholder="ระบุชื่อ-นามสกุลผู้ป่วย" class="w-full border border-gray-200 rounded-xl px-3.5 py-2.5 text-sm text-txt bg-white" required></div>
          <div><label class="block text-sm font-medium text-txt mb-1.5">แผนกที่ Admit</label><select id="f-dept" class="w-full border border-gray-200 rounded-xl px-3.5 py-2.5 text-sm text-txt bg-white"><option value="">-- เลือกแผนก --</option><option>3/2</option><option>3/3</option><option>3/4</option><option>3/5</option><option>5/3</option><option>5/4</option><option>5/5</option><option>7/2</option><option>7/3</option><option>7/4</option><option>7/5</option><option>7/6</option><option>ICU</option><option>อื่นๆ</option></select></div>
          <div><label class="block text-sm font-medium text-txt mb-1.5">First Dx</label><input type="text" id="f-dx" placeholder="เช่น ESRD, AKI" class="w-full border border-gray-200 rounded-xl px-3.5 py-2.5 text-sm text-txt bg-white"></div>
          <div class="sm:col-span-2"><label class="block text-sm font-medium text-txt mb-1.5">อาการสำคัญ</label><textarea id="f-symptoms" rows="2" placeholder="อาการนำที่มาโรงพยาบาล..." class="w-full border border-gray-200 rounded-xl px-3.5 py-2.5 text-sm text-txt bg-white resize-none"></textarea></div>
          <div><label class="block text-sm font-medium text-txt mb-1.5">ร.พ.ศูนย์ HD</label><input type="text" id="f-hd" placeholder="ชื่อโรงพยาบาล/ศูนย์ไตเทียม" class="w-full border border-gray-200 rounded-xl px-3.5 py-2.5 text-sm text-txt bg-white"></div>
          <div><label class="block text-sm font-medium text-txt mb-1.5">วันที่ HD ล่าสุด</label><input type="date" id="f-last-hd" class="w-full border border-gray-200 rounded-xl px-3.5 py-2.5 text-sm text-txt bg-white"></div>
          <div><label class="block text-sm font-medium text-txt mb-1.5">เส้นฟอกเลือด</label><select id="f-access" class="w-full border border-gray-200 rounded-xl px-3.5 py-2.5 text-sm text-txt bg-white"><option value="">-- เลือก --</option><option>AVF (Arteriovenous Fistula)</option><option>AVG (Arteriovenous Graft)</option><option>Perm Cath (Permanent Catheter)</option><option>DLC (Double Lumen Catheter)</option><option>ยังไม่มีเส้นฟอก</option><option>อื่นๆ</option></select></div>
          <div><label class="block text-sm font-medium text-txt mb-1.5">สิทธิ์การรักษา</label><select id="f-ins" class="w-full border border-gray-200 rounded-xl px-3.5 py-2.5 text-sm text-txt bg-white"><option value="">-- เลือกสิทธิ์ --</option><option>UC (บัตรทอง)</option><option>ประกันสังคม</option><option>ข้าราชการ</option><option>จ่ายตรง</option><option>รัฐวิสาหกิจ</option><option>ชำระเงินเอง</option><option>ประกันชีวิต</option><option>อื่นๆ</option></select></div>
          <div class="sm:col-span-2"><label class="block text-sm font-medium text-txt mb-1.5">หมายเหตุ</label><input type="text" id="f-note" placeholder="ข้อมูลเพิ่มเติม (ถ้ามี)" class="w-full border border-gray-200 rounded-xl px-3.5 py-2.5 text-sm text-txt bg-white"></div>
        </div>
        
        <div class="mt-7 flex flex-col sm:flex-row gap-3">
          <button type="submit" id="btn-submit" class="btn-primary text-white font-semibold px-6 py-3 rounded-2xl flex items-center justify-center gap-2 text-sm"> 
            <i data-lucide="send" style="width:16px;height:16px"></i> บันทึกและส่งรายงาน 
          </button> 
          <button type="button" onclick="resetForm()" class="bg-gray-100 hover:bg-gray-200 text-txt font-medium px-6 py-3 rounded-2xl flex items-center justify-center gap-2 text-sm transition-colors"> 
            <i data-lucide="rotate-ccw" style="width:16px;height:16px"></i> ล้างฟอร์ม 
          </button>
        </div>
      </form>

      <div id="toast" class="hidden fixed top-20 left-1/2 -translate-x-1/2 z-50"></div>
    </main>

    <div id="modal-overlay" class="hidden fixed inset-0 z-40 overlay flex items-center justify-center p-4">
      <div id="modal-card" class="bg-white rounded-3xl card-shadow-lg max-w-lg w-full max-h-[85%] overflow-auto toast-in"></div>
    </div>

    <div id="history-overlay" class="hidden fixed inset-0 z-40 overlay flex items-end sm:items-center justify-center p-0 sm:p-4">
      <div id="history-panel" class="bg-white rounded-t-3xl sm:rounded-3xl card-shadow-lg w-full sm:max-w-2xl max-h-[90%] overflow-auto toast-in"></div>
    </div>
  </div>

  <script>
    // ==========================================
    // ⚠️ นำ URL ของ Web App (Google Apps Script) อันใหม่มาใส่ที่นี่ค่ะ
    // ==========================================
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbx5_3FWKCN8m6nJ6gNY7K8L5tiyvNLLLWTXQGgDiMKylZOxblOqC8M9WZxjwlUekS0yXw/exec'; 

    let allRecords = JSON.parse(localStorage.getItem('admitRecords')) || [];
    function saveToHistory(record) {
      allRecords.unshift(record); 
      if(allRecords.length > 100) allRecords.pop(); 
      localStorage.setItem('admitRecords', JSON.stringify(allRecords));
    }

    document.getElementById('f-date').valueAsDate = new Date();

    // ฟังก์ชันช่วยสร้าง Row ใน Flex Message
    function createFlexRow(icon, label, value) {
      return {
        type: "box", layout: "baseline", spacing: "sm", margin: "md",
        contents: [
          { type: "text", text: icon, size: "sm", flex: 0 },
          { type: "text", text: label, size: "xs", color: "#999999", flex: 1, weight: "bold" },
          { type: "text", text: value, wrap: true, color: "#2D1B4E", size: "sm", weight: "bold", flex: 4, align: "right" }
        ]
      };
    }

    document.getElementById('admitForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const g = id => document.getElementById(id).value.trim();
      const name = g('f-name');
      if (!name) return;

      const btn = document.getElementById('btn-submit');
      btn.disabled = true;
      btn.innerHTML = '<span class="animate-pulse">กำลังบันทึกและส่ง LINE...</span>';

      const record = {
        date: g('f-date'),
        full_name: name,
        department: g('f-dept'),
        first_dx: g('f-dx'),
        symptoms: g('f-symptoms'),
        hd_center: g('f-hd'),
        last_hd_date: g('f-last-hd'),
        vascular_access: g('f-access'),
        insurance: g('f-ins'),
        note: g('f-note')
      };

      // สร้าง Flex Message JSON โทนสีมิ้นต์ที่นี่เลย
      const flexContents = [];
      if(record.full_name) flexContents.push({ type: "text", text: record.full_name, weight: "bold", size: "xl", color: "#2D1B4E", margin: "md" });
      if(record.department) flexContents.push(createFlexRow("🏢", "แผนก", record.department));
      if(record.first_dx) flexContents.push(createFlexRow("🩺", "First Dx", record.first_dx));
      if(record.symptoms) flexContents.push(createFlexRow("⚠️", "อาการสำคัญ", record.symptoms));
      if(record.hd_center) flexContents.push(createFlexRow("🏥", "ศูนย์ HD", record.hd_center));
      if(record.last_hd_date) flexContents.push(createFlexRow("📅", "HD ล่าสุด", record.last_hd_date));
      if(record.vascular_access) flexContents.push(createFlexRow("🔗", "เส้นฟอก", record.vascular_access));
      if(record.insurance) flexContents.push(createFlexRow("🛡️", "สิทธิ์", record.insurance));
      if(record.note) flexContents.push(createFlexRow("📝", "หมายเหตุ", record.note));

      const flexMessage = {
        type: "flex",
        altText: `🏥 Admit Report: ${record.full_name}`,
        contents: {
          type: "bubble",
          header: {
            type: "box", layout: "vertical", backgroundColor: "#52B8A3", spacing: "none", margin: "none",
            contents: [
              { type: "text", text: "🏥 Admit Report", weight: "bold", color: "#FFFFFF", size: "xl" },
              { type: "text", text: record.date || "-", color: "#D4F1EB", size: "xs", margin: "md" }
            ]
          },
          body: { type: "box", layout: "vertical", spacing: "md", contents: flexContents },
          footer: {
            type: "box", layout: "vertical", spacing: "sm",
            contents: [{ type: "text", text: "📱 ส่งจาก Admit Report System", size: "xs", color: "#999999", align: "center" }]
          }
        }
      };

      try {
        const params = new URLSearchParams();
        params.append('action', 'saveAndNotify'); 
        
        // แนบข้อมูลฟอร์ม
        Object.keys(record).forEach(key => params.append(key, record[key]));
        
        // แนบข้อมูล Flex Message และ Group ID เข้าไปด้วยในครั้งเดียว
        params.append('flexMessage', JSON.stringify(flexMessage));
        params.append('groupId', 'C8bfc3d76696780abdfd5f0f0ae0a0f78');

        // ยิง Fetch คำสั่งเดียวจบ!
        const gasResult = await fetch(GAS_URL, {
          method: 'POST',
          body: params
        });
        
        if (gasResult.ok) {
          showToast('✓ บันทึกชีตและส่ง LINE สำเร็จ', 'ok');
          saveToHistory(record); 
          showPreviewCard(record);
          resetForm();
        } else {
          showToast('⚠️ เกิดปัญหาการส่งข้อมูล', 'warn');
        }
      } catch (err) {
        showToast('❌ ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ได้', 'error');
        console.error(err);
      }
      
      btn.disabled = false;
      btn.innerHTML = '<i data-lucide="send" style="width:16px;height:16px"></i> บันทึกและส่งรายงาน';
      lucide.createIcons();
    });

    function resetForm() {
      document.getElementById('admitForm').reset();
      document.getElementById('f-date').valueAsDate = new Date();
    }

    function showPreviewCard(rec) {
      const formatDate = d => { if (!d) return '-'; const p = d.split('-'); return p.length===3 ? `${p[2]}/${p[1]}/${p[0]}` : d; };
      const row = (icon, label, val) => val ? `
        <div class="flex items-start gap-2 py-1.5">
          <i data-lucide="${icon}" class="text-mint4 flex-shrink-0 mt-0.5" style="width:15px;height:15px"></i>
          <div class="min-w-0"><span class="text-txtlight text-xs">${label}</span><div class="text-txt text-sm font-medium break-words">${val}</div></div>
        </div>` : '';

      document.getElementById('modal-card').innerHTML = `
        <div class="p-6">
          <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-2">
              <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-mint4 to-mint5 flex items-center justify-center">
                <i data-lucide="heart-pulse" class="text-white" style="width:18px;height:18px"></i>
              </div>
              <div>
                <div class="text-sm font-bold text-txt">🏥 Admit Report</div>
                <div class="text-[10px] text-txtlight">${formatDate(rec.date)}</div>
              </div>
            </div>
            <button onclick="closeModal()" class="w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center transition-colors">
              <i data-lucide="x" class="text-gray-400" style="width:18px;height:18px"></i>
            </button>
          </div>

          <div class="msg-card rounded-2xl p-4 mb-4">
            <div class="text-base font-bold text-purple5 mb-2">${rec.full_name || '-'}</div>
            <div class="divide-y divide-mint1">
              ${row('building-2','แผนกที่ Admit',rec.department)}
              ${row('stethoscope','First Dx',rec.first_dx)}
              ${row('alert-circle','อาการสำคัญ',rec.symptoms)}
              ${row('hospital','ศูนย์ HD ประจำ',rec.hd_center)}
              ${row('calendar','วันที่ HD ล่าสุด',rec.last_hd_date)}
              ${row('cable','เส้นฟอกเลือด',rec.vascular_access)}
              ${row('shield-check','สิทธิ์การรักษา',rec.insurance)}
              ${rec.note ? row('message-square','หมายเหตุ',rec.note) : ''}
            </div>
          </div>
          <div class="flex gap-2">
            <button onclick="closeModal()" class="w-full bg-gray-100 hover:bg-gray-200 text-txt font-medium py-2.5 rounded-xl text-sm transition-colors">ปิด</button>
          </div>
        </div>`;
      document.getElementById('modal-overlay').classList.remove('hidden');
      lucide.createIcons();
    }

    function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }
    document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

    function showHistory() {
      renderHistory();
      document.getElementById('history-overlay').classList.remove('hidden');
    }
    function closeHistory() { document.getElementById('history-overlay').classList.add('hidden'); }
    document.getElementById('history-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeHistory(); });

    function renderHistory() {
      const panel = document.getElementById('history-panel');
      if (!allRecords.length) {
        panel.innerHTML = `
          <div class="p-6 text-center">
            <div class="flex items-center justify-between mb-4">
              <h3 class="text-base font-bold text-txt">ประวัติรายงาน</h3>
              <button onclick="closeHistory()" class="w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center"><i data-lucide="x" class="text-gray-400" style="width:18px;height:18px"></i></button>
            </div>
            <i data-lucide="inbox" class="text-mint2 mx-auto mb-2" style="width:40px;height:40px"></i>
            <p class="text-txtlight text-sm">ยังไม่มีข้อมูลในเครื่องนี้</p>
          </div>`;
        lucide.createIcons();
        return;
      }

      let html = `<div class="p-5"><div class="flex items-center justify-between mb-4"><h3 class="text-base font-bold text-txt">ประวัติล่าสุด (${allRecords.length})</h3><button onclick="closeHistory()" class="w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center"><i data-lucide="x" class="text-gray-400" style="width:18px;height:18px"></i></button></div><div class="space-y-3">`;
      allRecords.forEach((rec, i) => {
        const fmtDate = rec.date ? rec.date.split('-').reverse().join('/') : '-';
        html += `
          <div class="msg-card rounded-2xl p-3.5 fade-in" style="animation-delay:${i*20}ms">
            <div class="flex items-start justify-between gap-2">
              <div class="min-w-0">
                <div class="font-bold text-sm text-purple5 truncate">${rec.full_name || '-'}</div>
                <div class="text-xs text-txtlight mt-0.5">${fmtDate} · ${rec.department || '-'}</div>
              </div>
              <div class="flex items-center gap-1 flex-shrink-0">
                <button onclick="viewRecord(${i})" class="w-7 h-7 rounded-lg hover:bg-mint1 flex items-center justify-center"><i data-lucide="eye" class="text-mint4" style="width:14px;height:14px"></i></button>
                <button onclick="deleteRecord(${i})" class="w-7 h-7 rounded-lg hover:bg-red-50 flex items-center justify-center"><i data-lucide="trash-2" class="text-red-400" style="width:14px;height:14px"></i></button>
              </div>
            </div>
          </div>`;
      });
      html += `</div></div>`;
      panel.innerHTML = html;
      lucide.createIcons();
    }

    function viewRecord(i) { closeHistory(); setTimeout(() => showPreviewCard(allRecords[i]), 200); }
    function deleteRecord(i) {
      if(confirm('ต้องการลบประวัตินี้ออกจากเครื่องใช่หรือไม่?')) {
        allRecords.splice(i, 1);
        localStorage.setItem('admitRecords', JSON.stringify(allRecords));
        renderHistory();
      }
    }

    function showToast(msg, type) {
      const el = document.getElementById('toast');
      let toastClass = type === 'warn' ? 'warn-toast' : type === 'error' ? 'error-toast' : 'success-toast';
      el.innerHTML = `<div class="${toastClass} text-white px-5 py-2.5 rounded-2xl card-shadow text-sm font-medium toast-in flex items-center gap-2">${msg}</div>`;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 3000);
    }

    lucide.createIcons();
  </script>
</body>
</html>
